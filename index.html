<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expensio - Mess Manager</title>
    
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/10149/10149458.png">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/10149/10149458.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Dancing+Script:wght@600&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

    <style>
        :root { 
            --p-color: #00a8ff; --bg: #f0f2f5; --card: #ffffff; 
            --text: #2f3640; --danger: #ff7675; --safe: #2ecc71;
        }
        [data-theme="dark"] {
            --bg: #1e272e; --card: #2f3640; --text: #f5f6fa;
        }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; transition: 0.3s; }
        
        .app-title { font-family: 'Poppins', sans-serif; font-weight: 600; font-size: 28px; margin: 0; color: var(--p-color); }
        .crafted-by { font-family: 'Dancing Script', cursive; font-size: 16px; color: #7f8c8d; margin-bottom: 20px; display: block; }

        #splashScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
        .loader { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid var(--p-color); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .container { display: none; max-width: 500px; margin: auto; }
        .card { background: var(--card); padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        
        /* আপনার অনুরোধ অনুযায়ী নিচের সেকশনে Georgia ফন্ট যোগ করা হয়েছে */
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 10px; font-size: 14px; box-sizing: border-box; background: var(--card); color: var(--text); font-family: 'Georgia', serif; }
        button { background: var(--p-color); color: white; border: none; font-weight: 600; cursor: pointer; }
        
        .pass-container { position: relative; }
        .toggle-btn { position: absolute; right: 10px; top: 20px; cursor: pointer; font-size: 12px; font-weight: bold; color: var(--p-color); }

        .summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .sum-card { padding: 10px; border-radius: 10px; text-align: center; font-size: 13px; font-weight: bold; }
        
        .status-badge { font-size: 12px; padding: 3px 8px; border-radius: 5px; margin-top: 5px; display: inline-block; }
        .get { background: rgba(46, 204, 113, 0.2); color: #2ecc71; }
        .give { background: rgba(231, 76, 60, 0.2); color: #e74c3c; }

        .history-panel { display: none; margin-top: 10px; padding: 10px; background: #f9f9f9; border-radius: 10px; font-size: 12px; }
        .log-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 10px; }
        .log-table th, .log-table td { border-bottom: 1px solid #ddd; padding: 8px; text-align: left; }
    </style>
</head>
<body data-theme="light">

<div id="splashScreen">
    <img src="https://cdn-icons-png.flaticon.com/512/10149/10149458.png" width="60" style="margin-bottom:15px;">
    <h1 class="app-title">Expensio</h1>
    <span class="crafted-by">Crafted by: Shahol Mahmud</span>
    <div class="loader"></div>
</div>

<div id="authScreen" class="container" style="display:none; margin-top:50px;">
    <div class="card" style="text-align:center;">
        <img src="https://cdn-icons-png.flaticon.com/512/10149/10149458.png" width="50" style="margin-bottom:10px;">
        <h1 class="app-title">Expensio</h1>
        <span class="crafted-by">Crafted by: Shahol Mahmud</span>
        <input type="text" id="groupName" placeholder="Group Name">
        <div class="pass-container">
            <input type="password" id="groupPass" placeholder="Password">
            <span class="toggle-btn" onclick="togglePass()">SHOW</span>
        </div>
        <button onclick="handleAuth()">Enter Group</button>
    </div>
</div>

<div id="appContainer" class="container">
    <div class="card" style="text-align:center;">
        <h2 class="app-title">Expensio</h2>
        <span class="crafted-by">Crafted by: Shahol Mahmud</span>
        <div style="display:flex; justify-content:space-around; font-size:12px; margin-top:10px;">
            <span onclick="toggleTheme()" style="cursor:pointer;">🌓 Theme</span>
            <span id="historyBtn" onclick="toggleArchive()" style="cursor:pointer; color:#e67e22;">📜 Archive</span>
            <span onclick="logout()" style="cursor:pointer; color:var(--danger)">🚪 Logout</span>
        </div>
    </div>

    <div id="archiveSection" class="card" style="display:none;">
        <h3>📜 Archived Months</h3>
        <div id="archiveList"></div>
        <button onclick="toggleArchive()" style="background:#bdc3c7;">Close</button>
    </div>

    <div class="summary-grid">
        <div class="sum-card" style="background:#e3f2fd; color:#0d47a1;">Market<br><span id="totalMarket">৳ 0</span></div>
        <div class="sum-card" style="background:#f3e5f5; color:#4a148c;">Fixed<br><span id="totalFixed">৳ 0</span></div>
        <div class="sum-card" style="background:#e8f5e9; color:#1b5e20;">Total Meals<br><span id="totalMeals">0</span></div>
        <div class="sum-card" style="background:#fff3e0; color:#e65100;">Meal Rate<br><span id="mealRate">৳ 0</span></div>
    </div>

    <div class="card">
        <h3>Add Member</h3>
        <input type="text" id="newMemberName" placeholder="New Member Name">
        <button onclick="addMember()">Add Member</button>
    </div>

    <div class="card">
        <h3>Add Expense</h3>
        <select id="mSelect"></select>
        <input type="number" id="mAmount" placeholder="Amount (৳)">
        <select id="mCategory">
            <option value="market">🛒 Market (Meal Based)</option>
            <option value="fixed">🏠 Fixed (Rent/Bill)</option>
        </select>
        <input type="text" id="mReason" placeholder="Reason (e.g. Bazar)">
        <input type="date" id="mDate">
        <button onclick="addExpense()">Save Record</button>
    </div>

    <div id="memberList"></div>

    <div class="card">
        <h3>Running Month Transactions</h3>
        <table class="log-table">
            <thead>
                <tr><th>Date</th><th>Name</th><th>Reason</th><th>Amount</th></tr>
            </thead>
            <tbody id="runningLogTable"></tbody>
        </table>
    </div>

    <button onclick="archiveAndReset()" style="background:#2f3640; margin-bottom:50px;">Close Month & Archive</button>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyABY4gQ5-4HW8QlXI2-NfYu...", // Your API Key
        authDomain: "mess-manager-904f3.firebaseapp.com",
        databaseURL: "https://mess-manager-904f3-default-rtdb.firebaseio.com",
        projectId: "mess-manager-904f3",
        storageBucket: "mess-manager-904f3.appspot.com",
        messagingSenderId: "827002437374",
        appId: "1:827002437374:web:34cb1ce1fb..."
    };

    firebase.initializeApp(firebaseConfig);
    const rootDb = firebase.database().ref("v3_groups");
    let currentGroupId = "";

    window.onload = () => {
        const name = localStorage.getItem('mess_group_name');
        const pass = localStorage.getItem('mess_group_pass');
        setTimeout(() => {
            if(name && pass) checkLogin(name, pass);
            else { document.getElementById('splashScreen').style.display='none'; document.getElementById('authScreen').style.display='block'; }
        }, 1000);
    };

    function togglePass() {
        const p = document.getElementById('groupPass');
        const b = document.querySelector('.toggle-btn');
        p.type = p.type === "password" ? "text" : "password";
        b.innerText = p.type === "password" ? "SHOW" : "HIDE";
    }

    function toggleTheme() {
        document.body.dataset.theme = document.body.dataset.theme === 'light' ? 'dark' : 'light';
    }

    function handleAuth() {
        const name = document.getElementById('groupName').value.trim().toLowerCase();
        const pass = document.getElementById('groupPass').value.trim();
        if(name && pass) checkLogin(name, pass);
    }

    function checkLogin(name, pass) {
        rootDb.child(name).once('value', snap => {
            if(snap.exists() && snap.val().password === pass) {
                localStorage.setItem('mess_group_name', name);
                localStorage.setItem('mess_group_pass', pass);
                currentGroupId = name;
                document.getElementById('splashScreen').style.display='none';
                document.getElementById('authScreen').style.display='none';
                document.getElementById('appContainer').style.display='block';
                startApp();
            } else if(!snap.exists()) {
                if(confirm("Create Group?")) rootDb.child(name).set({password: pass, members: []}).then(() => checkLogin(name, pass));
            } else alert("Wrong Password!");
        });
    }

    function startApp() {
        rootDb.child(currentGroupId).on('value', snap => {
            const data = snap.val();
            render(data.members || []);
            renderRunningLogs(data.members || []);
        });
    }

    function addMember() {
        const name = document.getElementById('newMemberName').value.trim();
        if(!name) return;
        rootDb.child(currentGroupId).child('members').once('value').then(snap => {
            let m = snap.val() || [];
            m.push({id: Date.now(), name: name, marketTotal:0, fixedTotal:0, meals:0, logs:[]});
            rootDb.child(currentGroupId).child('members').set(m);
            document.getElementById('newMemberName').value = "";
        });
    }

    function deleteMember(id) {
        if(confirm("Delete this member?")) {
            rootDb.child(currentGroupId).child('members').once('value').then(snap => {
                let m = snap.val() || [];
                rootDb.child(currentGroupId).child('members').set(m.filter(x => x.id != id));
            });
        }
    }

    function addExpense() {
        const id = document.getElementById('mSelect').value;
        const amt = parseFloat(document.getElementById('mAmount').value);
        const cat = document.getElementById('mCategory').value;
        const reason = document.getElementById('mReason').value || "Bazar";
        const date = document.getElementById('mDate').value || new Date().toLocaleDateString();

        if(!id || !amt) return alert("Select member and amount");

        rootDb.child(currentGroupId).child('members').once('value').then(snap => {
            let members = snap.val();
            let m = members.find(i => i.id == id);
            if(cat === 'market') m.marketTotal = (m.marketTotal || 0) + amt;
            else m.fixedTotal = (m.fixedTotal || 0) + amt;
            
            if(!m.logs) m.logs = [];
            m.logs.push({date, reason, amt, cat});
            rootDb.child(currentGroupId).child('members').set(members);
            document.getElementById('mAmount').value = "";
            document.getElementById('mReason').value = "";
        });
    }

    function updateMeals(id, val) {
        rootDb.child(currentGroupId).child('members').once('value').then(snap => {
            let members = snap.val();
            let m = members.find(i => i.id == id);
            m.meals = parseFloat(val) || 0;
            rootDb.child(currentGroupId).child('members').set(members);
        });
    }

    function render(members) {
        const list = document.getElementById('memberList');
        const select = document.getElementById('mSelect');
        let tMark = 0, tFix = 0, tMeal = 0;

        members.forEach(m => {
            tMark += (m.marketTotal || 0);
            tFix += (m.fixedTotal || 0);
            tMeal += (m.meals || 0);
        });

        const mRate = tMeal > 0 ? tMark / tMeal : 0;
        const fPer = members.length > 0 ? tFix / members.length : 0;

        document.getElementById('totalMarket').innerText = "৳ " + tMark;
        document.getElementById('totalFixed').innerText = "৳ " + tFix;
        document.getElementById('totalMeals').innerText = tMeal;
        document.getElementById('mealRate').innerText = "৳ " + mRate.toFixed(2);

        list.innerHTML = "";
        select.innerHTML = "<option value=''>Select Member</option>";

        members.forEach(m => {
            select.innerHTML += `<option value="${m.id}">${m.name}</option>`;
            const spent = (m.marketTotal || 0) + (m.fixedTotal || 0);
            const cost = (m.meals * mRate) + fPer;
            const bal = spent - cost;

            list.innerHTML += `
                <div class="card">
                    <div style="display:flex; justify-content:space-between;">
                        <b>${m.name}</b>
                        <span style="font-size:12px;">Meals: <input type="number" value="${m.meals || 0}" step="0.5" style="width:50px; padding:2px;" onchange="updateMeals(${m.id}, this.value)"></span>
                    </div>
                    <div style="font-size:12px; margin-top:8px;">
                        Spent: ৳ ${spent} | Personal Cost: ৳ ${cost.toFixed(2)}<br>
                        <span class="status-badge ${bal >= 0 ? 'get' : 'give'}">
                            ${bal >= 0 ? 'Will Get: ৳' + bal.toFixed(2) : 'Must Give: ৳' + Math.abs(bal).toFixed(2)}
                        </span>
                    </div>
                    <div style="margin-top:10px;">
                        <button onclick="toggleDetails(${m.id})" style="background:#eee; color:#333; width:auto; padding:5px 10px; font-size:11px;">Details</button>
                        <button onclick="deleteMember(${m.id})" style="background:none; color:var(--danger); font-size:11px; width:auto;">Remove</button>
                    </div>
                    <div id="details-${m.id}" class="history-panel">
                        <strong>Expense Details:</strong>
                        <table class="log-table">
                            ${(m.logs || []).map(l => `<tr><td>${l.date}</td><td>${l.reason}</td><td>৳${l.amt}</td></tr>`).join('')}
                        </table>
                    </div>
                </div>`;
        });
    }

    function renderRunningLogs(members) {
        let allLogs = [];
        members.forEach(m => {
            if(m.logs) m.logs.forEach(l => allLogs.push({...l, name: m.name}));
        });
        allLogs.sort((a,b) => new Date(b.date) - new Date(a.date));
        document.getElementById('runningLogTable').innerHTML = allLogs.map(l => `
            <tr><td>${l.date}</td><td>${l.name}</td><td>${l.reason}</td><td>৳${l.amt}</td></tr>
        `).join('');
    }

    function toggleDetails(id) {
        const el = document.getElementById(`details-${id}`);
        el.style.display = el.style.display === 'block' ? 'none' : 'block';
    }

    function toggleArchive() {
        const el = document.getElementById('archiveSection');
        el.style.display = el.style.display === 'block' ? 'none' : 'block';
        if(el.style.display === 'block') loadArchives();
    }

    function loadArchives() {
        rootDb.child(currentGroupId).child('archives').once('value', snap => {
            const arc = snap.val();
            const list = document.getElementById('archiveList');
            if(!arc) { list.innerHTML = "No history found."; return; }
            list.innerHTML = Object.keys(arc).map(month => `
                <div style="border-bottom:1px solid #ddd; padding:10px;">
                    <b>Month: ${month}</b> <button onclick="viewArchiveDetails('${month}')" style="width:auto; padding:2px 10px; font-size:10px; margin-left:10px;">View</button>
                </div>
            `).join('');
        });
    }

    function viewArchiveDetails(month) {
        rootDb.child(currentGroupId).child('archives').child(month).once('value', snap => {
            const members = snap.val();
            let txt = `Month: ${month}\n\n`;
            members.forEach(m => {
                txt += `${m.name}: Spent ৳${(m.marketTotal||0)+(m.fixedTotal||0)}, Meals: ${m.meals}\n`;
            });
            alert(txt);
        });
    }

    function archiveAndReset() {
        const month = prompt("Enter Month (e.g., Feb 2026):");
        if(!month) return;
        rootDb.child(currentGroupId).child('members').once('value').then(snap => {
            const data = snap.val();
            if(!data) return;
            rootDb.child(currentGroupId).child('archives').child(month).set(data).then(() => {
                const reset = data.map(m => ({ ...m, marketTotal: 0, fixedTotal: 0, meals: 0, logs: [] }));
                rootDb.child(currentGroupId).child('members').set(reset);
                alert("Month Closed and Archived!");
            });
        });
    }

    function logout() { localStorage.clear(); location.reload(); }
</script>
</body>
                </html>
